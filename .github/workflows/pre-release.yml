name: Pre-release on Merge to Main

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.18.3
      - name: Set Pre-release Version
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          NEW_VERSION="0.0.0-dev.${{ github.run_number }}.${SHORT_SHA}"
          echo "NEW_VERSION=${NEW_VERSION}" >> $GITHUB_ENV
          
          find . -name "package.json" -exec sed -i '' "s/\"version\": \".*\"/\"version\": \"${NEW_VERSION}\"/" {} +
          
      - run: npm install
        env:
          npm_config_arch: arm64
      - shell: pwsh
        run: echo "target=darwin-arm64" >> $env:GITHUB_ENV
        
      - run: npx @vscode/vsce@2.31.1 package --target ${{ env.target }} --pre-release
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.target }}
          path: "*.vsix"

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - uses: actions/download-artifact@v4
      - name: Publish VS Code Marketplace (Pre-release)
        run: npx vsce publish --packagePath $(find . -iname *.vsix) --pre-release
        env:
          VSCE_PAT: ${{ secrets.VSCE_TOKEN }}
